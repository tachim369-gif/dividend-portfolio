<!DOCTYPE html>
<!-- saved from url=(0044)https://benevolent-froyo-f6fc50.netlify.app/ -->
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配当ポートフォリオ管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,&lt;svg xmlns=&#39;http://www.w3.org/2000/svg&#39; viewBox=&#39;0 0 32 32&#39;&gt;&lt;rect width=&#39;32&#39; height=&#39;32&#39; rx=&#39;6&#39; fill=&#39;%231a1917&#39;/&gt;&lt;rect x=&#39;4&#39; y=&#39;20&#39; width=&#39;5&#39; height=&#39;8&#39; rx=&#39;1&#39; fill=&#39;%231a6b3c&#39;/&gt;&lt;rect x=&#39;11&#39; y=&#39;14&#39; width=&#39;5&#39; height=&#39;14&#39; rx=&#39;1&#39; fill=&#39;%231a6b3c&#39;/&gt;&lt;rect x=&#39;18&#39; y=&#39;8&#39; width=&#39;5&#39; height=&#39;20&#39; rx=&#39;1&#39; fill=&#39;%234caf7d&#39;/&gt;&lt;rect x=&#39;25&#39; y=&#39;4&#39; width=&#39;5&#39; height=&#39;24&#39; rx=&#39;1&#39; fill=&#39;%234caf7d&#39;/&gt;&lt;line x1=&#39;3&#39; y1=&#39;28&#39; x2=&#39;29&#39; y2=&#39;28&#39; stroke=&#39;%23a09e98&#39; stroke-width=&#39;1.5&#39;/&gt;&lt;/svg&gt;">
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0eeea;--border:#dddbd5;--border2:#c8c5bd;
  --text:#1a1917;--text2:#6b6860;--text3:#a09e98;
  --accent:#1a6b3c;--accent-bg:#e8f4ed;
  --accent2:#1a4a8a;--accent2-bg:#e6eef8;
  --danger:#a63020;--danger-bg:#faeae7;
  --warn:#7a5c1a;--warn-bg:#fef6e4;
  --mono:'Noto Sans JP',sans-serif;--sans:'Noto Sans JP',sans-serif;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;font-variant-numeric:normal;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;font-variant-numeric:normal;}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.h-title{font-size:21px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:9px;color:var(--accent);}
.h-icon{flex-shrink:0;}
.h-right{display:flex;align-items:center;gap:10px;flex-wrap:nowrap;}
.fx-label{font-size:12px;color:var(--text2);}
.fx-input{font-family:var(--mono);font-size:13px;width:88px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);color:var(--text);text-align:right;}
.fx-input:focus{outline:none;border-color:var(--border2);}
.price-update-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap;}
.price-update-btn:hover{background:var(--surface);border-color:var(--border2);color:var(--text);}
.price-update-btn:disabled{opacity:.5;cursor:not-allowed;}
.last-updated{display:none;}

main{max-width:1100px;margin:0 auto;padding:24px 24px 80px;}

/* Summary */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;}
.sum-card.primary{background:var(--text);border-color:var(--text);}
.sum-lbl{font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.sum-card.primary .sum-lbl{color:rgba(255,255,255,.5);}
.sum-val{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:-.5px;color:var(--text);}
.sum-card.primary .sum-val{color:#fff;}
.sum-val-row{display:flex;gap:20px;align-items:flex-start;}
.sum-val-col{flex:1;min-width:0;}
.sum-val-col .sum-sub{margin-top:4px;}
.sum-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.sum-card.primary .sum-sub{color:rgba(255,255,255,.4);}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--surface2);border-color:var(--border2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-jp{border-color:#b8d4f0;color:var(--accent2);background:var(--accent2-bg);}
.btn-jp:hover{background:#d0e4f8;}
.btn-us{border-color:#b4dcc6;color:var(--accent);background:var(--accent-bg);}
.btn-us:hover{background:#cceeda;}
.btn-csv{border-color:#e0d4b8;color:var(--warn);background:var(--warn-bg);}
.btn-csv:hover{background:#f5e8c4;}
.btn-danger{border-color:#f0c4bb;color:var(--danger);background:var(--danger-bg);}


/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;}
.section-card-hd{padding:12px 16px;font-size:12px;font-weight:600;letter-spacing:.6px;}
.section-card-hd.jp{color:var(--accent2);background:var(--accent2-bg);border-bottom:2px solid var(--accent2);}
.section-card-hd.us{color:var(--accent);background:var(--accent-bg);border-bottom:2px solid var(--accent);}
table{width:100%;border-collapse:collapse;}
thead th{padding:9px 10px;font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;text-align:right;background:var(--surface2);border-bottom:1px solid var(--border);}
thead th:nth-child(-n+3){text-align:left;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:7px 10px;vertical-align:middle;text-align:right;font-family:var(--mono);font-size:13px;font-variant-numeric:normal;}
td:nth-child(-n+3){text-align:left;font-family:var(--sans);font-size:13px;}
td input{font-family:var(--mono);font-size:13px;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);width:100%;padding:2px 0;text-align:right;transition:border-color .15s;}
td input.left{text-align:left;font-family:var(--sans);}
td input:focus{outline:none;border-bottom-color:var(--border2);}
.name-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-family:var(--sans);font-size:13px;color:var(--text);text-align:left;padding:4px 10px;transition:all .15s;text-decoration:none;display:block;width:100%;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.name-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--accent2);}
.name-cell-wrap{display:flex;align-items:center;gap:4px;min-width:0;}
.name-edit-btn{flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:none;background:none;color:var(--text3);cursor:pointer;border-radius:6px;transition:all .15s;}
.name-edit-btn:hover{background:var(--surface2);color:var(--text2);}
.name-input{font-family:var(--sans);font-size:13px;padding:4px 8px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);width:100%;}
.name-input:focus{outline:none;border-color:var(--accent2);}

.mono-cell{font-family:var(--mono);font-size:13px;color:var(--text2);}
.bold-cell{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;transition:color .15s,background .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ir-link-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;color:var(--text3);text-decoration:none;transition:all .15s;}
.ir-link-btn:hover{background:var(--surface2);color:var(--accent2);}
.del-btn:hover{color:var(--danger);background:var(--danger-bg);}
.empty-state{padding:40px 24px;text-align:center;color:var(--text3);font-size:13px;}
.up{color:var(--accent);}.down{color:var(--danger);}
.price-loading{color:var(--text3);font-size:11px;font-style:italic;}
.badge-cell{display:flex;align-items:center;}

/* Yield cols */
.yld-buy{font-family:var(--mono);font-size:13px;color:var(--accent2);}
.yld-mkt{font-family:var(--mono);font-size:13px;color:var(--text2);}

.footer-note{margin-top:12px;font-size:11px;color:var(--text3);line-height:1.7;}
.csv-input{display:none;}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:flex-start;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.modal-hd{padding:18px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--text);}
.modal-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.settle-edit{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--text3);}
.settle-edit select{font-family:var(--sans);font-size:12px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);}
.settle-edit select:focus{outline:none;border-color:var(--border2);}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;line-height:1;}
.modal-close:hover{color:var(--text);background:var(--surface2);}
.modal-body{padding:20px 24px 28px;}
.sec{margin-bottom:28px;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sec-title{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;}

.periods-list{display:flex;flex-direction:column;gap:8px;}
.period-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.period-card-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.period-label-input{flex:1;font-family:var(--sans);font-size:13px;font-weight:500;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);}
.period-label-input:focus{outline:none;border-color:var(--border2);}
.period-fields{display:grid;grid-template-columns:1fr;gap:8px;max-width:200px;}
.pf label{font-size:11px;color:var(--text3);display:block;margin-bottom:3px;}
.pf input{width:100%;font-family:var(--mono);font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);}
.pf input:focus{outline:none;border-color:var(--border2);}
.add-period-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed var(--border2);border-radius:var(--r);background:none;color:var(--text3);font-size:13px;font-family:var(--sans);cursor:pointer;width:100%;justify-content:center;transition:all .15s;margin-top:8px;}
.add-period-btn:hover{background:var(--surface2);color:var(--text2);}
.annual-total{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-top:12px;}
.annual-total .annual-total-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.annual-total .annual-total-label{flex:1;font-family:var(--sans);font-size:13px;font-weight:500;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);}
.annual-total .annual-total-spacer{width:21px;height:21px;flex-shrink:0;}
.annual-total .annual-total-sub{font-size:11px;color:var(--text3);margin-bottom:4px;}
.annual-total .annual-total-val{width:100%;max-width:200px;box-sizing:border-box;font-family:var(--mono);font-size:13px;font-weight:400;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);}

.ref-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.ref-link{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;font-family:var(--sans);text-decoration:none;transition:all .15s;}
.ref-link:hover{background:var(--surface);border-color:var(--border2);color:var(--text);}
.ref-link.irbank{border-color:#b8d4f0;color:var(--accent2);background:var(--accent2-bg);}
.ref-link.irbank:hover{background:#d0e4f8;}
.ref-link.macro{border-color:#b4dcc6;color:var(--accent);background:var(--accent-bg);}
.ref-link.macro:hover{background:#cceeda;}

@media(max-width:780px){
  main{padding:16px 12px 80px;}
  .sum-grid{grid-template-columns:repeat(4,1fr);gap:6px;}
  .sum-card{padding:10px 8px;}
  .sum-lbl{font-size:9px;}
  .sum-val{font-size:14px;}
  header{padding:0 12px;}
  .hm{display:none;}
  .overlay{padding:8px;}
}
</style>
</head>
<body>

<header>
  <div class="h-title"><svg class="h-icon" width="22" height="22" viewBox="0 0 16 16"><rect x="0" y="0" width="16" height="16" rx="4" fill="#1a1a1a"></rect><rect x="2" y="10" width="1.8" height="3" rx="0.5" fill="#1f5c38"></rect><rect x="5.4" y="8" width="1.8" height="5" rx="0.5" fill="#2c8050"></rect><rect x="8.8" y="5.5" width="1.8" height="7.5" rx="0.5" fill="#3fae6c"></rect><rect x="12.2" y="3" width="1.8" height="10" rx="0.5" fill="#5fe28c"></rect></svg>配当ポートフォリオ</div>
  <div class="h-right">
    <span class="fx-label">USD/JPY</span>
    <input type="number" class="fx-input" id="fx-rate" value="155" min="100" max="300" step="0.1">
    <span class="fx-label" style="font-family:var(--mono);font-size:13px;">円</span>
    <button class="price-update-btn" id="price-btn" onclick="updateAllPrices()" style="flex-shrink:0;white-space:nowrap;min-width:180px;justify-content:center;">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,1 4,1"></polyline><path d="M1,1 A7,7 0 1,1 0,8"></path></svg>
      <span id="price-btn-label">株価更新</span>
    </button>
    <span class="last-updated" id="last-updated"></span>
  </div>
</header>

<main>

<!-- ===== TAB: Portfolio ===== -->
<div class="tab-panel active" id="panel-portfolio">
  <div class="sum-grid">
    <div class="sum-card" style="background:#fbe9ee;border-color:#f2c2d2;">
      <div class="sum-lbl">年間配当収入（円）</div>
      <div class="sum-val" id="total-annual-after">—</div>
      <span id="total-annual" style="display:none;">18,282</span>
    </div>
    <div class="sum-card" style="background:var(--accent2-bg);border-color:#b8d4f0;">
      <div class="sum-lbl">日本株（円）</div>
      <div class="sum-val" id="jp-annual-after">15,100</div>
      <span id="jp-annual" style="display:none;">15,100</span>
    </div>
    <div class="sum-card" style="background:var(--accent-bg);border-color:#b4dcc6;">
      <div class="sum-lbl">米国株（円換算）</div>
      <div class="sum-val" id="us-annual-after">3,182</div>
      <span id="us-annual" style="display:none;">3,182</span>
    </div>
    <div class="sum-card" style="background:#fef6e4;border-color:#e0d4b8;">
      <div class="sum-lbl">含み損益（円）</div>
      <div class="sum-val up" id="total-gain">573,227</div>
      <div class="sum-sub" id="total-gain-sub" style="display:none;">含み益（円）</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn btn-jp" onclick="addRow(&#39;portfolio&#39;,&#39;jp&#39;)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"></line><line x1="2" y1="8" x2="14" y2="8"></line></svg>日本株
    </button>
    <button class="btn btn-us" onclick="addRow(&#39;portfolio&#39;,&#39;us&#39;)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="2" x2="8" y2="14"></line><line x1="2" y1="8" x2="14" y2="8"></line></svg>米国株
    </button>
    <button class="btn btn-csv" onclick="document.getElementById(&#39;csv-file&#39;).click()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12V4a1 1 0 011-1h5l3 3v6a1 1 0 01-1 1H4a1 1 0 01-1-1z"></path><path d="M9 3v3h3"></path><line x1="6" y1="8" x2="10" y2="8"></line><line x1="6" y1="10.5" x2="10" y2="10.5"></line></svg>
      楽天証券CSV
    </button>
    <input type="file" id="csv-file" class="csv-input" accept=".csv" onchange="handleCSV(this)">
    <button class="btn btn-danger" style="margin-left:auto;" onclick="resetAllData()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,1 4,1"></polyline><path d="M1,1 A7,7 0 1,1 0,8"></path></svg>
      データリセット
    </button>
  </div>

  <div class="table-wrap" id="card-jp">
    <div class="section-card-hd jp">🇯🇵 日本株</div>
    <table style="table-layout:fixed;">
      <colgroup>
        <col style="width:76px;"><col><col style="width:84px;"><col style="width:96px;"><col style="width:96px;"><col style="width:92px;"><col style="width:96px;"><col style="width:76px;"><col style="width:76px;"><col style="width:100px;"><col style="width:32px;"><col style="width:36px;">
      </colgroup>
      <tbody id="portfolio-body-jp"></tbody>
    </table>
  </div>
  <div class="table-wrap" id="card-us">
    <div class="section-card-hd us">🇺🇸 米国株</div>
    <table style="table-layout:fixed;">
      <colgroup>
        <col style="width:76px;"><col><col style="width:84px;"><col style="width:96px;"><col style="width:96px;"><col style="width:92px;"><col style="width:96px;"><col style="width:76px;"><col style="width:76px;"><col style="width:100px;"><col style="width:32px;"><col style="width:36px;">
      </colgroup>
      <tbody id="portfolio-body-us"></tbody>
    </table>
  </div>
  <div class="footer-note">
    ※ 利回り(買)=購入単価基準、利回り(現)=実勢単価基準。実勢単価は「株価を更新」ボタンで取得。<br>
    ※ 「詳細 ↗」で配当スケジュール・過去10年履歴を管理できます。データはブラウザに保存されます。
  </div>
</div>

</main>

<!-- Detail Modal -->
<div class="overlay" id="overlay" onclick="closeOut(event)">
<div class="modal" id="modal">
  <div class="modal-hd">
    <div>
      <div class="modal-title" id="m-title">銘柄詳細</div>
      <div class="modal-sub" id="m-sub"></div>
      <div class="settle-edit">
        <label for="m-settlement">決算月</label>
        <select id="m-settlement" onchange="updSettlement(this.value)">
          <option value="">未設定</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="14" y2="14"></line><line x1="14" y1="2" x2="2" y2="14"></line></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="sec">
      <div class="sec-hd">
        <span class="sec-title">配当スケジュール</span>

        配当回を追加（特別配当など）
      </button>

</div>
</div>


<script>
const SK='divpf_v5';
let portfolio=[],nextId=1,curId=null,curList=null;

/* ── Storage ── */
function save(){
  const fxRate=document.getElementById('fx-rate').value;
  localStorage.setItem(SK,JSON.stringify({portfolio,nextId,fxRate}));
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SK));
    if(d){
      portfolio=d.portfolio||[];
      nextId=d.nextId||1;
      if(d.fxRate) document.getElementById('fx-rate').value=d.fxRate;
      return;
    }
  }catch(e){}
  // Sample data
  const y=new Date().getFullYear();
  portfolio=[
    {id:nextId++,market:'jp',code:'7203',name:'トヨタ自動車',shares:100,buyPrice:2500,mktPrice:2940,
     periods:[{id:uid(),label:'中間配当',div:40,exDate:'2025-09-30',payDate:'2025-11-28'},
              {id:uid(),label:'期末配当',div:50,exDate:'2026-03-31',payDate:'2026-05-29'}],
     history:[{year:y-4,div:60,note:''},{year:y-3,div:70,note:''},{year:y-2,div:75,note:''},{year:y-1,div:90,note:''},{year:y,div:95,note:'予想'}]},
    {id:nextId++,market:'jp',code:'8316',name:'三井住友FG',shares:50,buyPrice:4800,mktPrice:5850,
     periods:[{id:uid(),label:'中間配当',div:60,exDate:'2025-09-30',payDate:'2025-12-02'},
              {id:uid(),label:'期末配当',div:62,exDate:'2026-03-31',payDate:'2026-05-29'}],
     history:[{year:y-4,div:95,note:''},{year:y-3,div:105,note:''},{year:y-2,div:110,note:''},{year:y-1,div:122,note:'分割後'},{year:y,div:157,note:'予想'}]},
    {id:nextId++,market:'us',code:'AAPL',name:'Apple',shares:20,buyPrice:150,mktPrice:185,
     periods:[{id:uid(),label:'Q1',div:0.25,exDate:'2025-02-07',payDate:'2025-02-13'},
              {id:uid(),label:'Q2',div:0.25,exDate:'2025-05-09',payDate:'2025-05-15'},
              {id:uid(),label:'Q3',div:0.25,exDate:'2025-08-08',payDate:'2025-08-14'},
              {id:uid(),label:'Q4',div:0.25,exDate:'2025-11-07',payDate:'2025-11-13'}],
     history:[{year:y-4,div:0.82,note:''},{year:y-3,div:0.90,note:''},{year:y-2,div:0.94,note:''},{year:y-1,div:0.97,note:''},{year:y,div:1.00,note:'予想'}]},
  ];
  save();
}

function uid(){return Math.random().toString(36).slice(2,8);}
function getFx(){return parseFloat(document.getElementById('fx-rate').value)||155;}
function fmtNum(v){return Math.round(v).toLocaleString('ja-JP');}
function fmtJpy(v){return Math.round(v).toLocaleString('ja-JP');}
function fmtPrice(r,v){
  if(r.market==='us') return parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return Math.round(v||0).toLocaleString('ja-JP');
}
function fmtDiv(r,v){
  if(r.market==='us') return parseFloat(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return Math.round(v||0).toLocaleString('ja-JP');
}
function fmtDate(d){return d?d.replace(/-/g,'/'):'—';}
function annualDiv(r){return(r.periods||[]).reduce((s,p)=>s+(p.div||0),0);}
function settleInfo(r){
  const n=(r.periods||[]).length;
  const m=r.settlementMonth?`${r.settlementMonth}月期`:'';
  if(!m&&!n)return'';
  return[m,n?`年${n}回`:''].filter(Boolean).join('・');
}
function calcAnnualJpy(r){const d=annualDiv(r);return r.market==='us'?(r.shares||0)*d*getFx():(r.shares||0)*d;}
function yldBuy(r){const d=annualDiv(r);return(r.buyPrice&&d)?(d/r.buyPrice*100):null;}
function yldMkt(r){const d=annualDiv(r);return(r.mktPrice&&d)?(d/r.mktPrice*100):null;}
function gainJpy(r){
  if(!r.mktPrice||!r.buyPrice||!r.shares)return null;
  const diff=(r.mktPrice-r.buyPrice)*r.shares;
  return r.market==='us'?diff*getFx():diff;
}

/* ── Totals ── */
function updateTotals(){
  let jp=0,us=0,jpN=0,usN=0,gain=0,gainN=0;
  portfolio.forEach(r=>{
    if(r.market==='jp'){jp+=calcAnnualJpy(r);jpN++;}
    else{us+=calcAnnualJpy(r);usN++;}
    const g=gainJpy(r);if(g!==null){gain+=g;gainN++;}
  });
  document.getElementById('total-annual').textContent=fmtJpy(jp+us);
  const afterTax=Math.round((jp+us)*(1-0.20315));
  document.getElementById('total-annual-after').textContent=fmtJpy(afterTax);
  document.getElementById('jp-annual').textContent=fmtJpy(jp);
  document.getElementById('us-annual').textContent=fmtJpy(us);
  document.getElementById('jp-annual-after').textContent=fmtJpy(Math.round(jp*(1-0.20315)));
  document.getElementById('us-annual-after').textContent=fmtJpy(Math.round(us*(1-0.20315)));
  const gainEl=document.getElementById('total-gain');
  const gainSub=document.getElementById('total-gain-sub');
  if(gainN>0){
    gainEl.textContent=fmtJpy(gain);
    gainEl.className='sum-val '+(gain>=0?'up':'down');
    gainSub.textContent=gain>=0?'含み益（円）':'含み損（円）';
  }else{gainEl.textContent='—';gainEl.className='sum-val';}
}

/* ── Click-to-edit for formatted cells ── */
function startEdit(td,id,field){
  const r=portfolio.find(x=>x.id===id);if(!r)return;
  const val=r[field]||'';
  const step=r.market==='us'&&field==='buyPrice'?'0.01':'1';
  td.innerHTML=`<input type="number" value="${val}" min="0" step="${step}"
    style="width:100%;font-family:var(--mono);font-size:13px;background:transparent;border:none;border-bottom:1px solid var(--border2);text-align:right;outline:none;"
    onblur="endEdit(this,${id},'${field}')" onkeydown="if(event.key==='Enter')this.blur()">`;
  const inp=td.querySelector('input');inp.focus();inp.select();
}
function endEdit(input,id,field){
  const r=portfolio.find(x=>x.id===id);if(!r)return;
  r[field]=parseFloat(input.value)||0;
  const td=input.parentElement;
  if(field==='shares') td.textContent=r.shares?r.shares.toLocaleString('ja-JP'):'—';
  else td.textContent=r.buyPrice?fmtPrice(r,r.buyPrice):'—';
  td.onclick=()=>startEdit(td,id,field);
  refreshRowUI('portfolio',r);save();
}

function renderPortfolio(){

      <td class="hm" id="buyprice-cell-${r.id}" onclick="startEdit(this,${r.id},'buyPrice')" style="cursor:text;">${r.buyPrice?fmtPrice(r,r.buyPrice):'—'}</td>

      <td class="hm" id="gain-${r.id}" style="font-family:var(--mono);font-size:13px;color:${g!==null?(g>=0?'var(--accent)':'var(--danger)'):'var(--text3)'};">${g!==null?fmtJpy(g):'—'}</td>

        <a class="ir-link-btn" href="${r.market==='jp'?`https://irbank.net/${r.code}`:`https://finance.yahoo.com/quote/${r.code}/`}" target="_blank" rel="noopener" title="銘柄ページを開く">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1V9"/><path d="M10 2h4v4"/><line x1="14" y1="2" x2="7" y2="9"/></svg>

      <td style="text-align:center;"><button class="del-btn" onclick="delRow('portfolio',${r.id})">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2,4 14,4"/><path d="M5,4V2h6v2"/><path d="M6,7v5M10,7v5"/><rect x="3" y="4" width="10" height="10" rx="1"/></svg>
      </button></td>
    </tr>`;

  const jpRows=portfolio.filter(r=>r.market==='jp').sort(byCode);
  const usRows=portfolio.filter(r=>r.market==='us').sort(byCode);
  const colHdJp=`<tr style="background:var(--surface2);">
    <th style="width:76px;text-align:left;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">コード</th>
    <th style="text-align:left;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">銘柄名</th>
    <th style="width:84px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">保有株数</th>
    <th style="width:96px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">購入単価(円)</th>
    <th style="width:96px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">実勢単価(円)</th>
    <th style="width:92px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">含み損益(円)</th>
    <th style="width:96px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">年間配当(円)</th>
    <th style="width:76px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">購入利回り</th>
    <th style="width:76px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">実勢利回り</th>
    <th style="width:100px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">年間配当計(円)</th>
    <th style="width:32px;border-bottom:1px solid var(--border);"></th>
    <th style="width:36px;border-bottom:1px solid var(--border);"></th>
  </tr>`;
  const colHdUs=`<tr style="background:var(--surface2);">

    <th style="text-align:left;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">銘柄名</th>
    <th style="width:84px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">保有株数</th>

    <th style="width:96px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">実勢単価($)</th>
    <th style="width:92px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);" class="hm">含み損益(円)</th>
    <th style="width:96px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">年間配当($)</th>
    <th style="width:76px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">購入利回り</th>

    <th style="width:100px;text-align:right;padding:6px 8px;font-size:11px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);">年間配当計(円)</th>

      <td></td><td></td><td></td>
      <td style="text-align:right;padding:8px 8px;font-family:var(--mono);font-size:13px;color:var(--text);">${fmtJpy(annSum)}</td>

  tbUs.innerHTML=usRows.length
    ?colHdUs+usRows.map(mkRow).join('')+totalRow(usRows)

function render(){renderPortfolio();}

/* ── Row ops ── */
function getList(name){return portfolio;}

function updRow(listName,id,field,val){
  const list=getList(listName);
  const r=list.find(x=>x.id===id);if(!r)return;
  if(field==='code'){
    // 同じコードが既に存在する場合は重複追加しない
    const dup=list.find(x=>x.id!==id&&x.code===val.trim());
    if(dup){alert(`${val}はすでに登録されています`);return;}
  }
  if(['shares','buyPrice','mktPrice'].includes(field))r[field]=parseFloat(val)||0;
  else r[field]=val;
  refreshRowUI(listName,r);save();
}

/* ── 銘柄名インライン編集 ── */
function editName(listName,id){
  const wrap=document.getElementById(`name-wrap-${id}`);
  if(!wrap)return;
  const list=getList(listName);
  const r=list.find(x=>x.id===id);if(!r)return;
  const current=r.name||'';
  wrap.innerHTML=`<input type="text" class="name-input" id="name-input-${id}" value="${current.replace(/"/g,'&quot;')}" placeholder="銘柄名">`;
  const input=document.getElementById(`name-input-${id}`);
  input.focus();input.select();
  const commit=()=>{
    r.name=input.value.trim();
    save();
    renderPortfolio();
  };
  input.addEventListener('blur',commit);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')input.blur();});
}

function refreshRowUI(listName,r){
  if(listName==='portfolio'){
    const adiv=annualDiv(r);
    const adivStr=fmtDiv(r,adiv);
    const yb=yldBuy(r),ym=yldMkt(r),ann=calcAnnualJpy(r),g=gainJpy(r);
    const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
    const setHtml=(id,v)=>{const e=document.getElementById(id);if(e)e.innerHTML=v;};
    set('adiv-'+r.id,adiv>0?adivStr:'—');
    set('ybuy-'+r.id,yb!==null?yb.toFixed(2)+'%':'—');
    set('ymkt-'+r.id,ym!==null?ym.toFixed(2)+'%':'—');
    set('ann-'+r.id,ann>0?fmtJpy(ann):'—');
    const ge=document.getElementById('gain-'+r.id);
    if(ge){
      ge.textContent=g!==null?fmtJpy(g):'—';
      ge.style.color=g!==null?(g>=0?'var(--accent)':'var(--danger)'):'var(--text3)';
    }
    if(r.mktPrice)setHtml('mkt-'+r.id,fmtPrice(r,r.mktPrice));
    const sc=document.getElementById('shares-cell-'+r.id);
    if(sc&&sc.querySelector('input')===null) sc.textContent=r.shares?r.shares.toLocaleString('ja-JP'):'—';
    const bc=document.getElementById('buyprice-cell-'+r.id);
    if(bc&&bc.querySelector('input')===null) bc.textContent=r.buyPrice?fmtPrice(r,r.buyPrice):'—';
  }
  updateTotals();
}

function addRow(listName,market){
  const list=getList(listName);
  const r={id:nextId++,market,code:'',name:'',shares:0,buyPrice:0,mktPrice:0,periods:defPeriods(market),history:[]};
  list.push(r);save();
  renderPortfolio();
  setTimeout(()=>{
    const tr=document.querySelector(`tr[data-id="${r.id}"]`);
    if(tr){const inp=tr.querySelectorAll('input');if(inp[0])inp[0].focus();}
  },50);
}

function delRow(listName,id){
  portfolio=portfolio.filter(r=>r.id!==id);
  save();render();
}

function defPeriods(market){
  if(market==='jp')return[
    {id:uid(),label:'中間配当',div:0,exDate:'',payDate:''},
    {id:uid(),label:'期末配当',div:0,exDate:'',payDate:''},
  ];
  return[
    {id:uid(),label:'Q1',div:0,exDate:'',payDate:''},
    {id:uid(),label:'Q2',div:0,exDate:'',payDate:''},
    {id:uid(),label:'Q3',div:0,exDate:'',payDate:''},
    {id:uid(),label:'Q4',div:0,exDate:'',payDate:''},
  ];
}

/* ── Price update via Yahoo Finance (proxy-free approach) ── */
async function updateAllPrices(){
  const btn=document.getElementById('price-btn');
  const lastUpdated=document.getElementById('last-updated');
  btn.disabled=true;
  document.getElementById('price-btn-label').textContent='取得中...';
  const allRows=portfolio.filter(r=>r.code);
  if(!allRows.length){btn.disabled=false;return;}


  try{
    const codes=allRows.map(r=>({code:r.code,market:r.market}));
    const res=await fetch('/.netlify/functions/get-prices',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({codes})
    });
    const data=await res.json();
    const prices=data.prices||{};

    // 為替レート自動反映
    if(prices['USDJPY']){
      const fxRate=Math.round(parseFloat(prices['USDJPY'])*100)/100;
      document.getElementById('fx-rate').value=fxRate;
    }

    let updated=0;
    allRows.forEach(r=>{
      if(prices[r.code]!=null){
        r.mktPrice=parseFloat(prices[r.code]);
        updated++;
        refreshRowUI('portfolio',r);
      }
    });
    save();render();
    const now=new Date();
    document.getElementById('price-btn-label').textContent=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 更新済`;
  }catch(e){
    console.error(e);
    document.getElementById('price-btn-label').textContent='取得失敗';
  }
  btn.disabled=false;
}

function renderPeriods(r){
  const list=document.getElementById('m-periods');
  if(!(r.periods&&r.periods.length)){
    list.innerHTML='<div style="color:var(--text3);font-size:13px;padding:8px 0;">配当回がありません。</div>';
    renderAnnualTotal(r);return;
  }
  const cur=r.market==='us'?'$':'¥';
  const unit=r.market==='us'?'$':'円';
  const step=r.market==='us'?'0.01':'1';
  list.innerHTML=r.periods.map(p=>`
    <div class="period-card">
      <div class="period-card-hd">
        <input class="period-label-input" type="text" value="${p.label||''}" placeholder="中間配当・Q1・特別配当など"
          onchange="updPeriod('${p.id}','label',this.value)">
        <button class="del-btn" onclick="delPeriod('${p.id}')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
        </button>
      </div>
      <div class="period-fields">
        <div class="pf"><label>配当額（${unit}/1株）</label>
          <input type="number" value="${p.div||''}" placeholder="${cur}0" step="${step}" min="0" oninput="updPeriod('${p.id}','div',this.value)"></div>
      </div>
    </div>`).join('');
  renderAnnualTotal(r);
}

function renderAnnualTotal(r){
  const el=document.getElementById('m-annual-total');if(!el)return;
  const unit=r.market==='us'?'$':'円';
  const total=annualDiv(r);
  const totalStr=r.market==='us'?total.toFixed(2):Math.round(total).toLocaleString('ja-JP');
  el.innerHTML=`<div class="annual-total-hd"><div class="annual-total-label">年間配当合計</div><div class="annual-total-spacer"></div></div><div class="annual-total-sub">配当額（${unit}/1株）</div><div class="annual-total-val">${totalStr}</div>`;
}

function updPeriod(pid,field,val){
  const list=getList(curList);
  const r=list.find(x=>x.id===curId);if(!r)return;
  const p=r.periods.find(x=>x.id===pid);if(!p)return;
  if(field==='div')p.div=parseFloat(val)||0;else p[field]=val;
  refreshRowUI(curList,r);renderAnnualTotal(r);save();
}

function addPeriod(){
  const list=getList(curList);
  const r=list.find(x=>x.id===curId);if(!r)return;
  r.periods.push({id:uid(),label:'特別配当',div:0,exDate:'',payDate:''});
  save();renderPeriods(r);refreshRowUI(curList,r);
}

function delPeriod(pid){
  const list=getList(curList);
  const r=list.find(x=>x.id===curId);if(!r)return;
  r.periods=r.periods.filter(p=>p.id!==pid);
  save();renderPeriods(r);refreshRowUI(curList,r);
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  curId=null;curList=null;
}
function closeOut(e){if(e.target===document.getElementById('overlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();}});

/* ── CSV ── */
function handleCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>parseCSV(e.target.result);
  reader.readAsText(file,'Shift_JIS');input.value='';
}
function parseCSVLine(line){
  // ダブルクオートで囲まれた項目内のカンマ（桁区切りなど）を無視して正しく分割する
  const result=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){
      if(ch==='"'){
        if(line[i+1]==='"'){cur+='"';i++;}
        else inQ=false;
      }else cur+=ch;
    }else{
      if(ch==='"')inQ=true;
      else if(ch===','){result.push(cur);cur='';}
      else cur+=ch;
    }
  }
  result.push(cur);
  return result;
}
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const num=v=>parseFloat((v||'').replace(/,/g,''))||0;
  // CSV内に「参考為替レート」が記載されていればそれを使う（米国株の円換算購入単価をドルに戻すため）
  const fxMatch=text.match(/参考為替レート[^"]*"\s*,\s*"([\d.]+)"/);
  const fx=(fxMatch?parseFloat(fxMatch[1]):0)||getFx();
  const csvRows=[]; // {code,market,name,shares,buyPrice,mktPrice}
  for(const line of lines){
    const cols=parseCSVLine(line).map(c=>c.trim());
    const code=cols[0]||'';
    const isJp=/^\d{4}$/.test(code),isUs=/^[A-Z]{1,5}$/.test(code);
    if(!isJp&&!isUs)continue;
    const market=isJp?'jp':'us';
    const name=cols[1]||code;
    let shares,buyPrice,mktPrice;
    if(isJp){
      // 日本株CSV列構成: コード,銘柄名,保有数量,執行中,内訳通常数量,内訳積立数量,平均取得価額(円),取得総額,現在値(円),前日比,時価評価額,評価損益
      shares=num(cols[2]);buyPrice=num(cols[6]);mktPrice=num(cols[8]);
    }else{
      // 米国株CSV列構成: ティッカー,銘柄名,取引所,保有数量,執行中数量,内訳通常数量,内訳積立数量,表示通貨,平均取得価額(円),取得総額,現在値(USドル),前日比,時価評価額,評価損益
      // ※平均取得価額は円換算で記載されているため、参考為替レートでドルに換算する
      shares=num(cols[3]);
      const buyPriceYen=num(cols[8]);
      buyPrice=fx>0?Math.round((buyPriceYen/fx)*100)/100:0;
      mktPrice=num(cols[10]);
    }
    csvRows.push({code,market,name,shares,buyPrice,mktPrice});
  }
  if(!csvRows.length){alert('対応する銘柄が見つかりませんでした。');return;}
  if(fxMatch)document.getElementById('fx-rate').value=fx;

  const marketsInCsv=new Set(csvRows.map(r=>r.market));
  const existingByCode={};
  portfolio.forEach(r=>{existingByCode[r.code]=r;});

  // CSVに無いが、CSVに出てきた市場区分に属する既存銘柄は削除（保有していないとみなす）
  const kept=portfolio.filter(r=>!marketsInCsv.has(r.market));

  let added=0,updated=0;
  const newRows=csvRows.map(c=>{
    const old=existingByCode[c.code];
    if(old&&marketsInCsv.has(old.market)){
      updated++;
      return {...old,name:c.name,shares:c.shares,buyPrice:c.buyPrice,mktPrice:c.mktPrice};
    }
    added++;
    return {id:nextId++,market:c.market,code:c.code,name:c.name,shares:c.shares,buyPrice:c.buyPrice,mktPrice:c.mktPrice,periods:defPeriods(c.market),history:[]};
  });

  portfolio=[...kept,...newRows];
  save();render();
  alert(`CSVを反映しました（新規${added}銘柄・更新${updated}銘柄）。CSVに無い銘柄は削除されました。配当情報は各銘柄の詳細から入力してください。`);
}

function resetAllData(){
  if(!confirm('保存されているすべてのデータ（保有銘柄・配当情報）を削除します。\nこの操作は元に戻せません。本当にリセットしますか？'))return;
  if(!confirm('もう一度確認します。本当にすべて削除してよろしいですか？'))return;
  localStorage.removeItem(SK);
  portfolio=[];nextId=1;
  document.getElementById('fx-rate').value=155;
  save();render();
  alert('データをリセットしました。楽天証券CSVを読み込んで復元してください。');
}

document.getElementById('fx-rate').addEventListener('input',()=>{render();save();});
load();render();
